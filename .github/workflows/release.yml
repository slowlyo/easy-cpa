name: release

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
            wails_platform: windows/amd64
            wails_ldflags: "-X easy-cpa/internal/backend.AppVersion=${{ github.ref_name }}"
          - os: ubuntu-latest
            artifact_name: linux
            wails_platform: linux/amd64
            wails_build_flags: "-tags webkit2_41"
            wails_ldflags: "-X easy-cpa/internal/backend.AppVersion=${{ github.ref_name }}"
          - os: macos-latest
            artifact_name: macos
            wails_platform: darwin/universal
            wails_build_flags: ""
            wails_ldflags: "-X easy-cpa/internal/backend.AppVersion=${{ github.ref_name }}"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Linux 构建依赖
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: 构建 Wails 应用
        shell: bash
        run: |
          extra_flags="${{ matrix.wails_build_flags }}"
          if [ -n "$extra_flags" ]; then
            go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -platform "${{ matrix.wails_platform }}" $extra_flags -ldflags "${{ matrix.wails_ldflags }}"
          else
            go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -platform "${{ matrix.wails_platform }}" -ldflags "${{ matrix.wails_ldflags }}"
          fi

      - name: 校验 macOS 通用架构
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path="$(find build/bin -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "未找到 macOS .app 产物"
            exit 1
          fi
          app_binary="${app_path}/Contents/MacOS/easy-cpa"
          if [ ! -f "$app_binary" ]; then
            echo "未找到 macOS 可执行文件: $app_binary"
            exit 1
          fi
          archs="$(lipo -archs "$app_binary")"
          echo "macOS binary archs: $archs"
          [[ "$archs" == *"x86_64"* && "$archs" == *"arm64"* ]]

      - name: 打包 Windows 产物
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          Compress-Archive -Path "build/bin/easy-cpa.exe" -DestinationPath "release/easy-cpa-$tag-windows.zip" -Force

      - name: 打包 Linux 产物
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p release
          chmod +x build/bin/easy-cpa
          tar -C build/bin -czf "release/easy-cpa-${tag}-linux.tar.gz" easy-cpa

      - name: 打包 macOS 产物
        if: runner.os == 'macOS'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p release
          app_path="$(find build/bin -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "未找到 macOS .app 产物"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "release/easy-cpa-${tag}-macos.zip"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 生成校验文件
        shell: bash
        run: |
          cd dist
          find . -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
